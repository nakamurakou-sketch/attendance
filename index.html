
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>出席確認</title>

https://unpkg.com/html5-qrcode>

<style>
  body { text-align: center; font-family: sans-serif; }
  #reader { width: 300px; margin: auto; }
  button { padding: 10px; font-size: 16px; margin: 5px; }
</style>
</head>
<body>

<h2>出席確認（カメラ版）</h2>

<div id="reader"></div>

<p id="status"></p>

<h3>スキャン済み</h3>
<ul id="list"></ul>

<button onclick="sendAll()">まとめて送信</button>
<button onclick="clearList()">リセット</button>

<script>
const API_URL = "ここにGASのURL";

let scannedList = [];

function onScanSuccess(decodedText) {
  if (!scannedList.includes(decodedText)) {
    scannedList.push(decodedText);
    updateList();
    document.getElementById("status").textContent =
      "追加：" + decodedText;
  } else {
    document.getElementById("status").textContent =
      "重複：" + decodedText;
  }
}

function updateList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  scannedList.forEach(code => {
    const li = document.createElement("li");
    li.textContent = code;
    list.appendChild(li);
  });
}

function sendAll() {
  if (scannedList.length === 0) {
    alert("データがありません");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ list: scannedList })
  });

  alert("送信完了 ✅");
  scannedList = [];
  updateList();
}

function clearList() {
  scannedList = [];
  updateList();
}

// カメラ起動
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      devices[0].id,
      {
        fps: 10,
        qrbox: 250
      },
      onScanSuccess
    );
  }
});
</script>

</body>
</html>
