<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>出席確認</title>

https://unpkg.com/html5-qrcode

<style>
  body { text-align: center; font-family: sans-serif; }
  #reader { width: 300px; margin: auto; }
  input {
    font-size: 20px;
    padding: 10px;
    width: 80%;
    margin: 10px;
  }
  button { padding: 10px; font-size: 16px; margin: 5px; }
</style>
</head>
<body>

<h2>出席確認</h2>

<div id="reader"></div>

<p>または手入力👇</p>

<input id="barcode" placeholder="バーコード入力">

<p id="status"></p>

<h3>スキャン済み</h3>
<ul id="list"></ul>

<button onclick="sendAll()">まとめて送信</button>
<button onclick="clearList()">リセット</button>

<script>
const API_URL = "https://script.google.com/a/macros/osakashs.ed.jp/s/AKfycbzIsd4C7hyj0Raas3lC2kugD1XGBGWl2qU6jnmp6Gf8EPJX_KRgp3NKDrpTOUvAbmo21g/exec";

let scannedList = [];

function addCode(code) {
  if (code && !scannedList.includes(code)) {
    scannedList.push(code);
    updateList();
    document.getElementById("status").textContent =
      "追加：" + code;
  } else {
    document.getElementById("status").textContent =
      "重複または無効";
  }
}

function updateList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  scannedList.forEach(code => {
    const li = document.createElement("li");
    li.textContent = code;
    list.appendChild(li);
  });
}

// カメラスキャン
function onScanSuccess(decodedText) {
  addCode(decodedText);
}

// 手入力（Enter）
document.getElementById("barcode").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    addCode(e.target.value);
    e.target.value = "";
  }
});

function sendAll() {
  if (scannedList.length === 0) {
    alert("データがありません");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ list: scannedList })
  });

  alert("送信完了 ✅");
  scannedList = [];
  updateList();
}

function clearList() {
  scannedList = [];
  updateList();
}

// カメラ起動
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  }
});
</script>

</body>
</html>
